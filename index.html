<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="style.css">
        <title>SmallTin</title>
    </head>
    <body>
        <h2>聯絡簿</h2>
        <div class="dropdown">
            <div class="dropbutton">4/24 (五) ▶</div>
            <div class="dropdown-content">
                <ul>
                    <li>1. 國習 L5 全</li>
                    <li>2. 數講 p65-69、習 3-2</li>
                    <li>3. 英講 p42 43</li>
                    <li>4. 考國 L4 填空</li>
                    <li>5. 早數 x2、英句子 <text style="font-size: 20px;">①</text> ~ <text style="font-size: 20px;">⑦</text></li>
                    <li>6. 理習 U3 全</li>
                </ul>
        </div>
        <div class="dropdown">
            <div class="dropbutton">4/23 (四) ▶</div>
            <div class="dropdown-content">
                <ul>
                    <li>1. 國單 x1</li>
                    <li>2. 數課 3-2</li>
                    <li>3. 英講 p40 41</li>
                    <li>4. 理講 p41 42</li>
                    <li>5. 早歷 3-1、理 3-4</li>
                </ul>
        </div>
        <script>
            // 1. 改用 querySelectorAll 抓取「所有」符合 class 的按鈕
            const allBtns = document.querySelectorAll('.dropbutton');

            // 2. 使用 forEach 幫每一個按鈕都綁定點擊事件
            allBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
            // 3. 找到點擊按鈕的下一個兄弟元素 (也就是對應的 .dropdown-content)
            const panel = this.nextElementSibling;

            if (panel.style.maxHeight) {
                // 如果是展開狀態，則收合
                panel.style.maxHeight = null;
                // 自動將箭頭換回 ▶
                this.textContent = this.textContent.replace('▼', '▶');
            } else {
                // 如果是收合狀態，則展開
                panel.style.maxHeight = panel.scrollHeight + "px";
                // 自動將箭頭換成 ▼
                this.textContent = this.textContent.replace('▶', '▼');
                    }
                });
            });
        </script>
    </body>
</html>
